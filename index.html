<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DnD Map Constructor Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-menu" class="screen">
        <div class="menu-box">
            <h1>🎲 DnD Map Constructor</h1>
            <div class="input-group">
                <input type="text" id="new-world-name" placeholder="Название мира..." value="Новый Мир">
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <span style="font-size:12px; align-self:center; color:#aaa;">Размер сетки:</span>
                    <input type="number" id="new-world-size" value="100" min="10" max="1000" style="width:80px; text-align:center;">
                </div>
                <button id="btn-create-world">Создать новый мир</button>
            </div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <div class="upload-group">
                <label for="upload-world-file" class="file-label">📂 Загрузить мир (.json)</label>
                <input type="file" id="upload-world-file" accept=".json" style="display: none;">
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        
        <div id="tabs-bar-container">
            <div id="tabs-wrapper"></div>
            <button id="btn-add-tab" class="btn-success">➕ Новая группа</button>
        </div>

        <header>
            <div class="header-left" style="display: flex; align-items: center; gap: 10px;">
                <span style="font-weight: bold; color: #aaa;">Мир:</span>
                <span id="display-world-name-text" class="play-only"></span>
                <input type="text" id="edit-world-name-input" class="editor-only" style="width: 200px; padding: 4px 8px;">
            </div>
            <div class="header-buttons">
                <button id="btn-toggle-mode" class="btn-mode-edit">Режим: Редактор</button>
                <button id="btn-open-global-map">🗺️ Полная карта</button>
                <button id="btn-save-world">💾 Сохранить мир</button>
                <button id="btn-exit-menu">🚪 Выйти</button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="left-panel">
                <div class="ui-section">
                    <h3 class="panel-title" style="margin-bottom:5px;">Локация (<span id="coord-display">50,50</span>)</h3>
                    <input type="text" id="loc-name-input" placeholder="Название локации...">
                </div>

                <div class="ui-section">
                    <h4>Быстрый переход</h4>
                    <div style="display:flex; gap:3px; margin-bottom:5px;">
                        <input type="number" id="teleport-x" placeholder="X" style="padding:5px;">
                        <input type="number" id="teleport-y" placeholder="Y" style="padding:5px;">
                        <button id="btn-teleport-coords" style="padding:5px;">Go</button>
                    </div>
                    <select id="teleport-name-select">
                        <option value="">Поиск по имени...</option>
                    </select>
                </div>
                
                <div class="editor-only ui-section">
                    <h4>Картинка локации</h4>
                    <input type="file" id="loc-image-input" accept="image/*">
                </div>

                <div class="ui-section">
                    <h4>Состояния локации</h4>
                    <select id="loc-state-select"></select>
                    <div class="editor-only row-buttons" style="margin-top: 8px;">
                        <button id="btn-add-state">+ Добавить</button>
                        <button id="btn-delete-state" class="btn-danger">❌ Удалить</button>
                    </div>
                </div>

                <div class="ui-section dice-section">
                    <h4>🎲 Быстрый бросок кубика</h4>
                    <div class="dice-buttons">
                        <button data-dice="6">d6</button>
                        <button data-dice="8">d8</button>
                        <button data-dice="10">d10</button>
                        <button data-dice="20">d20</button>
                    </div>
                    <div id="main-dice-result">Результат: -</div>
                </div>

                <div class="ui-section">
                    <button id="btn-open-char-manager" style="width: 100%; font-weight: bold; background: #2753a7;">👥 Персонажи и Монстры</button>
                </div>
            </aside>

            <main class="location-view">
                <div class="location-wrapper" id="location-wrapper">
                    <button class="arrow arrow-n" data-dir="N">⬆️</button>
                    <button class="arrow arrow-ne" data-dir="NE">↗️</button>
                    <button class="arrow arrow-e" data-dir="E">➡️</button>
                    <button class="arrow arrow-se" data-dir="SE">↘️</button>
                    <button class="arrow arrow-s" data-dir="S">⬇️</button>
                    <button class="arrow arrow-sw" data-dir="SW">↙️</button>
                    <button class="arrow arrow-w" data-dir="W">⬅️</button>
                    <button class="arrow arrow-nw" data-dir="NW">↖️</button>

                    <div id="location-canvas"></div>
                </div>
            </main>
        </div>
    </div>

    <div id="modal-char-manager" class="modal hidden">
        <div class="modal-content manager-modal-content">
            <span class="close-modal" id="close-manager-modal">&times;</span>
            <h3>👥 Справочник Персонажей</h3>
            <div class="manager-actions">
                <input type="text" id="char-search-input" placeholder="Поиск персонажа по имени...">
                <button id="btn-manager-create-char" class="btn-success">➕ Создать персонажа</button>
            </div>
            <div id="manager-char-list" class="manager-grid"></div>
        </div>
    </div>

    <div id="modal-char-card" class="modal hidden">
        <div class="modal-content big-card-content">
            <span class="close-modal" id="close-char-modal">&times;</span>
            <div class="char-card-layout">
                <div class="char-card-visual">
                    <img id="char-card-img" src="" alt="Облик">
                    <div class="editor-only" style="width:100%;">
                        <input type="file" id="char-card-image-input" accept="image/*" style="width:100%;">
                    </div>
                </div>
                <div class="char-card-info">
                    <input type="text" id="char-card-name" placeholder="Имя...">
                    <textarea id="char-card-desc" placeholder="Описание и заметки..."></textarea>
                    
                    <div class="secret-section">
                        <button id="btn-toggle-secret" style="width: 100%; margin-bottom: 5px;">Показать/Скрыть характеристики</button>
                        <textarea id="char-card-secret" class="hidden" placeholder="Секретные статы..."></textarea>
                    </div>

                    <div class="ui-section">
                        <h5>Облики / Формы</h5>
                        <div id="char-forms-buttons" class="row-buttons" style="flex-wrap: wrap; margin-bottom: 5px;"></div>
                        <div class="editor-only row-buttons">
                            <button id="btn-add-form">+ Добавить форму</button>
                        </div>
                    </div>

                    <div class="char-card-actions">
                        <button id="btn-card-spawn-here" class="btn-success" style="width:100%; font-weight:bold; margin-bottom:10px;">Выставить персонажа на текущую локацию</button>
                        <div class="row-buttons">
                            <button id="btn-remove-from-loc" class="btn-danger">Убрать с карты</button>
                            <button id="btn-kill-char" class="btn-danger">Статус (Жив/Мертв)</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-global-map" class="modal hidden">
        <div class="modal-content map-modal-content">
            <span class="close-modal" id="close-map-modal">&times;</span>
            
            <div class="map-modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding-right:30px;">
                <h3>Карта мира (<span id="map-dimension-title">100x100</span>)</h3>
                <div class="editor-only" style="display:flex; align-items:center; gap:8px; background:#16161a; padding:6px 12px; border-radius:4px; border:1px solid #333;">
                    <span style="font-size:13px; color:#aaa;">Изменить размер мира:</span>
                    <input type="number" id="map-edit-size-input" min="10" max="1000" style="width:70px; padding:4px; text-align:center;">
                    <button id="btn-apply-map-size" style="padding:4px 8px; font-size:12px;" class="btn-success">Применить</button>
                </div>
            </div>

            <div id="map-viewport">
                <div id="map-grid"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
